<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#253b8f" />
    <title>離線中｜WaysLeader AI</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 50px rgb(15 23 42 / 0.08);
      }

      img {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #64748b;
      }

      button {
        width: 100%;
        margin-top: 24px;
        border: 0;
        border-radius: 12px;
        background: #253b8f;
        color: #ffffff;
        padding: 13px 16px;
        font-size: 15px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>目前離線中</h1>
      <p>請確認網路連線後再重新整理。為了保護老師與孩子資料，系統不會在離線狀態顯示敏感內容。</p>
      <button type="button" onclick="window.location.reload()">重新整理</button>
    </main>
  </body>
</html>
